<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raw JSON Viewer</title>
</head>
<body>
<pre id="json-display"></pre>

<script>
    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error('Could not load JSON file');
            return response.json();
        })
        .then(data => {
            // Display JSON with proper line breaks
            document.getElementById('json-display').textContent = JSON.stringify(data, null, 4);
        })
        .catch(error => {
            document.getElementById('json-display').textContent = 'Error: ' + error.message;
        });
</script>
</body>
</html>
